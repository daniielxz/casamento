<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presente de Casamento</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px 30px;
      border-radius: 28px;
      max-width: 450px;
      width: 100%;
      margin: auto;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s ease;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    h1 {
      color: #2d6a4f;
      font-size: 1.8rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    p {
      color: #555;
      margin: 15px 0;
      line-height: 1.5;
    }

    .btn {
      display: block;
      margin: 25px auto;
      padding: 14px 20px;
      width: 85%;
      border-radius: 50px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #2d6a4f;
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
      background: #1b4d3e;
      transform: scale(1.02);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .btn:active {
      transform: scale(0.98);
    }

    img {
      margin-top: 10px;
      border-radius: 16px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      max-width: 100%;
      height: auto;
    }

    .chave {
      background: #f0f4f1;
      padding: 12px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      margin-top: 10px;
    }

    strong {
      color: #2d6a4f;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>💚 Maria Clara & Daniel Henrique</h1>
  <p>Nos ajude com um presente especial</p>

  <button class="btn" onclick="copiarPix()">
    💸 Copiar chave Pix
  </button>

  <p>Ou escaneie o QR Code:</p>

  <img src="QR Code.jpeg" alt="QR Code Pix" width="200">

  <div class="chave">
    <strong>Chave:</strong><br>
    daniel2007pac@gmail.com
  </div>
</div>

<script>
  function copiarPix() {
    const chave = "daniel2007pac@gmail.com";
    navigator.clipboard.writeText(chave).then(() => {
      alert("✅ Chave Pix copiada! Agora é só colar no seu banco 💚");
    }).catch(() => {
      alert("❌ Não foi possível copiar. Copie manualmente: " + chave);
    });
  }
</script>

</body>
</html>
