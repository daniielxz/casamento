<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Presente de Casamento</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f7f7f7;
  padding: 20px;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h1 {
  color: #3a6b35;
}

.btn {
  display: block;
  margin: 20px auto; /* centraliza */
  padding: 15px;
  width: 80%;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  background: #4CAF50;
  color: white;
  font-weight: bold;
}

img {
  margin-top: 20px;
  border-radius: 12px;
}
</style>

<script>
function copiarPix() {
  const chave = "daniel2007pac@gmail.com";
  navigator.clipboard.writeText(chave);
  alert("Chave Pix copiada! Agora é só colar no seu banco 💚");
}
</script>

</head>

<body>

<div class="container">
  <h1>Maria Clara & Daniel Henrique</h1>
  <p>Nos ajude com um presente 💚</p>

  <button class="btn" onclick="copiarPix()">
    💸 Copiar chave Pix
  </button>

  <p>Ou escaneie o QR Code:</p>

  <img src="QR Code.jpeg" width="200">

  <p><strong>Chave:</strong><br>daniel2007pac@gmail.com</p>

</div>

</body>
</html>
